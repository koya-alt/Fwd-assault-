name: Build SO

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Build
  run: |
    export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653
    $ANDROID_NDK_HOME/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk APP_ABI=arm64-v8a

    - name: Upload SO
      uses: actions/upload-artifact@v4
      with:
        name: so
        path: libs/**/*