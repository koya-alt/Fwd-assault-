name: Build SO

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install NDK
      run: |
        sudo apt update
        sudo apt install -y android-sdk

    - name: Build
      run: |
        ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk

    - name: Upload SO
      uses: actions/upload-artifact@v4
      with:
        name: so
        path: libs/**/*
